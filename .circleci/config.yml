version: 2.1

orbs:
  onepassword: onepassword/secrets@1.0.0
  # slack: circleci/slack@4.13.3
  node: circleci/node@7.1.0

parameters:
  # Slack params
  slack_branch:
    default: "main"
    type: string
  slack_channel_failure:
    default: "#bot-circleci-builds"
    type: string
  slack_channel_success:
    default: "#bot-circleci-builds"
    type: string
  plugin_name:
    type: string
    default: cordova-plugin-marketplace
  # TODO: Extract from package.
  plugin_version:
    type: string
    default: "1.1.0"
  node_version:
    type: string
    default: "22.14"
  onepassword_version:
    type: string
    default: "2.29.0"

commands:
  ios-import-certs:
    steps:
      - run:
          name: Install certificates
          command: |
            op read -n -o "${DEVELOPER_AUTHORITY_ID}.cer" \
                          "op://${DEVELOPER_AUTHORITY_ITEM_PATH}/${DEVELOPER_AUTHORITY_ID}.cer"
            op read -n -o "${DEVELOPMENT_CERTIFICATE_ID}.cer" \
                          "op://${DEVELOPMENT_CERTIFICATE_ITEM_PATH}/${DEVELOPMENT_CERTIFICATE_ID}.cer"
            op read -n -o "${DEVELOPMENT_CERTIFICATE_ID}.p12" \
                          "op://${DEVELOPMENT_CERTIFICATE_ITEM_PATH}/${DEVELOPMENT_CERTIFICATE_ID}.p12"
            security create-keychain -p 'tempPassword' ios-build.keychain
            security import "${DEVELOPER_AUTHORITY_ID}.cer" -k ~/Library/Keychains/ios-build.keychain \
              -T /usr/bin/codesign -t agg
            security import ${DEVELOPMENT_CERTIFICATE_ID}.cer -k ~/Library/Keychains/ios-build.keychain \
              -T /usr/bin/codesign -t agg
            security import ${DEVELOPMENT_CERTIFICATE_ID}.p12 -k ~/Library/Keychains/ios-build.keychain \
              -P "${DEVELOPMENT_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -t agg
            security list-keychain -s ~/Library/Keychains/ios-build.keychain
            security default-keychain -s ~/Library/Keychains/ios-build.keychain
            security unlock-keychain -p 'tempPassword' ~/Library/Keychains/ios-build.keychain

# NOTE: Plugin packaging and npm publishing have moved to GitHub Actions
# (.github/workflows/ci.yml + publish.yml, OIDC trusted publishing). CircleCI
# now only runs the on-device build smoke tests below, which pack the plugin
# locally (npm run package) instead of pulling it from a shared workspace.

jobs:
  android:
    docker:
      - image: cimg/android:2025.03-node
    parameters:
      onepassword-env:
        type: string
        default: '/tmp/op.env'
    shell: op run --env-file="<< parameters.onepassword-env >>" -- /bin/bash -eo pipefail
    steps:
      - onepassword/install-cli:
          version: << pipeline.parameters.onepassword_version >>
      - run:
          shell: /bin/bash -eo pipefail
          name: Setup secret environment and read from OnePassword
          command: |
            echo "Reading OnePassword environment file..."
            op read "op://${BURBANK_ENV_FILE}" -o << parameters.onepassword-env >>
      - checkout
      - node/install:
          node-version: << pipeline.parameters.node_version >>
      - node/install-packages:
          # Override to use cache
          override-ci-command: npm install
      - run:
          name: Package plugin and tests
          command: npm run package
      - run:
          name: Create test app
          command: |
            npm run setup:demo
            npm run setup:demo:android
            npm run build:demo:android:release
      - store_artifacts:
          path: demo/platforms/android/app/build/outputs/bundle/release/app-release.aab
          destination: << pipeline.parameters.plugin_name >>-tests-<< pipeline.parameters.plugin_version>>.aab

  ios:
    macos:
      xcode: 16.2.0
    resource_class: macos.m1.medium.gen1
    parameters:
      onepassword-env:
        type: string
        default: '/tmp/op.env'
    shell: op run --env-file="<< parameters.onepassword-env >>" -- /bin/bash --login -eo pipefail
    steps:
      - onepassword/install-cli:
          version: << pipeline.parameters.onepassword_version >>
      - run:
          shell: /bin/bash -eo pipefail
          name: Setup secret environment and read from OnePassword
          command: |
            echo "Reading OnePassword environment file..."
            op read "op://${BURBANK_ENV_FILE}" -o << parameters.onepassword-env >>
      - checkout
      - node/install:
          node-version: << pipeline.parameters.node_version >>
      - node/install-packages:
          # Override to use cache
          override-ci-command: npm install
      - ios-import-certs
      - run:
          name: Package plugin and tests
          command: npm run package
      - run:
          name: Create test app
          command: |
            npm run setup:demo
            npm run setup:demo:ios
            npm run build:demo:ios:release
      - run:
          name: Package test app
          command: |
            mkdir Payload
            mv "demo/platforms/ios/build/Release-iphonesimulator/Genvid Cordova Marketplace Demo.app" Payload
            zip -9r << pipeline.parameters.plugin_name >>-tests-<< pipeline.parameters.plugin_version >>.ipa Payload
      - store_artifacts:
          path: << pipeline.parameters.plugin_name >>-tests-<< pipeline.parameters.plugin_version >>.ipa

workflows:
  default:
    jobs:
      - android:
          filters:
            tags:
              # Only tags starting with "v" followed by one or more digits and a dot
              only: /v\d+\..*/
          context:
            - burbank-onepassword
      - ios:
          filters:
            tags:
              # Only tags starting with "v" followed by one or more digits and a dot
              only: /v\d+\..*/
          context:
            - burbank-onepassword
