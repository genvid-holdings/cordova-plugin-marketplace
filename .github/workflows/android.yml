name: Android

# Two tiers:
#   smoke      - compile/link the demo app with the plugin on every PR and push to
#                main. No emulator (we run no on-device tests, so booting one would
#                add flakiness for zero signal) and no secrets.
#   distribute - on-demand (workflow_dispatch) or on a vX.Y.Z tag, build a SIGNED
#                release APK using the Burbank signing keystore from 1Password and
#                upload it as a downloadable artifact for sideloading (adb install).
#
# The single secret OP_SERVICE_ACCOUNT_TOKEN (a 1Password service account scoped to
# the Project-Burbank vault) gates the distribute tier only.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke build (compile/link)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Version lockstep guard
        run: npm run version-guard
      - run: npm ci
      - name: Pack plugin + tests
        run: npm run package
      - name: Set up demo project (no signing config)
        run: npm run setup:demo:sim
      - name: Add Android platform
        run: npm run setup:demo:android
      - name: Build demo (debug, compile/link smoke)
        run: npm run build:demo:android

  distribute:
    name: Signed APK (sideload artifact)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install 1Password CLI
        uses: 1Password/install-cli-action@v1
      - name: Version lockstep guard
        run: npm run version-guard
      - run: npm ci
      - name: Pack plugin + tests
        run: npm run package
      - name: Load keystore coordinates from 1Password
        uses: 1Password/load-secrets-action@v2
        with:
          export-env: true
        env:
          KEYSTORE_ALIAS: op://Project-Burbank/Burbank App Signing Keystore/alias
          KEYSTORE_PASSWORD: op://Project-Burbank/Burbank App Signing Keystore/password
          KEYSTORE_FILENAME: op://Project-Burbank/Burbank App Signing Keystore/filename
      - name: Fetch keystore file (dynamic filename)
        run: op read "op://Project-Burbank/Burbank App Signing Keystore/${KEYSTORE_FILENAME}" -o "$RUNNER_TEMP/release.keystore"
      - name: Set up demo project
        run: npm run setup:demo:sim
      - name: Add Android platform
        run: npm run setup:demo:android
      - name: Build signed release APK (sideloadable, not AAB)
        working-directory: demo
        run: >
          npx --prefix . cordova build android --release --
          --keystore="$RUNNER_TEMP/release.keystore"
          --storePassword="$KEYSTORE_PASSWORD"
          --alias="$KEYSTORE_ALIAS"
          --password="$KEYSTORE_PASSWORD"
          --packageType=apk
      - name: Compute artifact label (ref_name may contain '/')
        id: meta
        run: echo "label=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-android-${{ steps.meta.outputs.label }}
          path: demo/platforms/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

# Deferred (not in scope this pass): publishing to a Google Play internal testing
# track via Fastlane `supply`. Sideloading the signed APK above covers the current
# tester-distribution need.
